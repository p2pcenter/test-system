document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

//cdn.snkrdunk.com/apparel_used_listings/775dba32-5dec-4123-8a4e-485594c89716/6555990.jpeg?size=m', url:'https://snkrdunk.com/search?keywords=SR-SPC+%5BOP09-093%5D&sort=price_low&itemConditions=psa_10&isSaleOnly=true&page=1'},\n    {id:'c6', char:'Sengoku', rarity:'R', code:'OP07-046', yen:32000, prevYen:30500, image_url:'https://cdn.snkrdunk.com/apparel_used_listings/d2ed19ad-f58b-4b40-8095-3475c79b5d37/818194.png?size=m', url:'https://snkrdunk.com/search?keywords=Sengoku+R-SPC++%5BOP07-046%5D&sort=price_low&itemConditions=psa_10&isSaleOnly=true&page=1'},\n    {id:'c7', char:'Queen', rarity:'C', code:'ST04-005', yen:15400, prevYen:16000, image_url:'https://cdn.snkrdunk.com/apparel_used_listings/96361da1-5558-4ee0-8b52-da87966eb222/432345.png?size=m', url:'https://snkrdunk.com/search?keywords=C-SPC+%5BST04-005&sort=price_low&itemConditions=psa_10&isSaleOnly=true&page=1'},\n    {id:'c8', char:'Rob Lucci', rarity:'SR', code:'OP05-093', yen:19000, prevYen:18200, image_url:'https://cdn.snkrdunk.com/apparel_used_listings/bbc7bc3e-aad5-407f-b395-e7e2fe904e3f/6555990.jpeg?size=m', url:'https://snkrdunk.com/search?keywords=SR-SPC+%5BOP05-093&sort=price_low&itemConditions=psa_10&isSaleOnly=true&page=1'},\n    {id:'c9', char:'Kaido', rarity:'SR', code:'ST04-003', yen:19900, prevYen:21000, image_url:'https://cdn.snkrdunk.com/apparel_used_listings/aed66921-ad13-4a83-93b5-f5585ef6d563/8444820.jpeg?size=m', url:'https://snkrdunk.com/search?keywords=SR-SPC+%5BST04-003%5D&sort=price_low&itemConditions=psa_10&isSaleOnly=true&page=1'},\n    {id:'c10', char:'Donquixote Rocinante', rarity:'SEC', code:'OP04-119', yen:23300, prevYen:22100, image_url:'https://cdn.snkrdunk.com/apparel_used_listings/c47b6fb7-790b-4a33-9273-b9e689c56169/8369714.jpeg?size=m', url:'https://snkrdunk.com/search?keywords=SEC-SPC+%5BOP04-119%5D&sort=price_low&itemConditions=psa_10&isSaleOnly=true&page=1'},\n    {id:'c11', char:'Perona', rarity:'SR', code:'OP06-093', yen:34900, prevYen:34000, image_url:'https://cdn.snkrdunk.com/apparel_used_listings/6dd733ef-531c-4a0d-b402-804515b71a9a/7359873.jpeg?size=m', url:'https://snkrdunk.com/search?keywords=SR-SPC++%5BOP06-093%5D&sort=price_low&itemConditions=psa_10&isSaleOnly=true&page=1'},\n    {id:'c12', char:'Shirahoshi', rarity:'SR', code:'EB01-057', yen:43000, prevYen:45000, image_url:'https://cdn.snkrdunk.com/apparel_used_listings/354f25ea-6f53-49e7-bdca-07fe93cff184/7356882.jpeg?size=m', url:'https://snkrdunk.com/search?keywords=SR-SPC+%5BEB01-057%5D&sort=price_low&itemConditions=psa_10&isSaleOnly=true&page=1'}\n  ];\n  RAR = { SEC:{cat:'Secret Rare',color:'#F5A623'}, SR:{cat:'Super Rare',color:'#BF5AF2'}, R:{cat:'Rare',color:'#0A84FF'}, C:{cat:'Common',color:'#8E8E93'} };\n\n  initCats(){ return [{id:'cat-sec',name:'Secret Rare',color:'#F5A623'},{id:'cat-sr',name:'Super Rare',color:'#BF5AF2'},{id:'cat-r',name:'Rare',color:'#0A84FF'},{id:'cat-c',name:'Common',color:'#8E8E93'}]; }\n  initCardCat(){ const m={SEC:'cat-sec',SR:'cat-sr',R:'cat-r',C:'cat-c'}; const o={}; this.CARDS.forEach(c=>{o[c.id]=m[c.rarity]||'cat-c';}); return o; }\n\n  getCats(){ return this.state.cats||(this.state.cats=this.initCats(),this.state.cats); }\n  getCardCat(){ return this.state.cardCat||(this.state.cardCat=this.initCardCat(),this.state.cardCat); }\n\n  renameCategory=(id,name)=>{ const cats=(this.state.cats||this.initCats()).map(c=>c.id===id?{...c,name}:c); this.save('cats',cats); this.setState({cats}); };\n  addCategory=()=>{ const cats=[...(this.state.cats||this.initCats()),{id:'cat-'+Date.now(),name:'หมวดใหม่',color:'#636366'}]; this.save('cats',cats); this.setState({cats}); };\n  removeCategory=(id)=>{\n    const cats=(this.state.cats||this.initCats()).filter(c=>c.id!==id);\n    const fallback=cats[0]?.id||'cat-r';\n    const cardCat={...(this.state.cardCat||this.initCardCat())};\n    Object.keys(cardCat).forEach(k=>{ if(cardCat[k]===id) cardCat[k]=fallback; });\n    const filter=this.state.filter===id?'ทั้งหมด':this.state.filter;\n    this.save('cats',cats); this.save('card_cat',cardCat);\n    this.setState({cats,cardCat,filter});\n  };\n  moveCatUp=(id)=>{ const a=[...(this.state.cats||this.initCats())]; const i=a.findIndex(c=>c.id===id); if(i<1) return; [a[i-1],a[i]]=[a[i],a[i-1]]; this.save('cats',a); this.setState({cats:a}); };\n  moveCatDown=(id)=>{ const a=[...(this.state.cats||this.initCats())]; const i=a.findIndex(c=>c.id===id); if(i<0||i>=a.length-1) return; [a[i],a[i+1]]=[a[i+1],a[i]]; this.save('cats',a); this.setState({cats:a}); };\n  reorderCat=(srcId,dstId)=>{ if(!srcId||srcId===dstId) return; const a=[...(this.state.cats||this.initCats())]; const si=a.findIndex(c=>c.id===srcId); const di=a.findIndex(c=>c.id===dstId); if(si<0||di<0) return; const [item]=a.splice(si,1); a.splice(di,0,item); this.save('cats',a); this.setState({cats:a}); };\n  // ── ลากสลับหมวดหมู่แบบ pointer (ใช้ได้ทั้งเมาส์และจอสัมผัส) ──\n  startCatDrag=(id)=>(e)=>{\n    if(e.cancelable) e.preventDefault();\n    e.stopPropagation();\n    this._catDragId=id; this._catOverId=null;\n    const move=(ev)=>{\n      const pt=ev.touches?ev.touches[0]:ev;\n      if(!pt) return;\n      const el=document.elementFromPoint(pt.clientX,pt.clientY);\n      const chip=el&&el.closest&&el.closest('[data-cat-id]');\n      this._catOverId = chip ? chip.getAttribute('data-cat-id') : this._catOverId;\n    };\n    const up=()=>{\n      window.removeEventListener('mousemove',move);\n      window.removeEventListener('mouseup',up);\n      window.removeEventListener('touchmove',move);\n      window.removeEventListener('touchend',up);\n      if(this._catDragId && this._catOverId) this.reorderCat(this._catDragId, this._catOverId);\n      this._catDragId=null; this._catOverId=null;\n    };\n    window.addEventListener('mousemove',move);\n    window.addEventListener('mouseup',up);\n    window.addEventListener('touchmove',move,{passive:false});\n    window.addEventListener('touchend',up);\n  };\n  cycleCat=(cardId)=>{ const cats=this.state.cats||this.initCats(); const cardCat=this.state.cardCat||this.initCardCat(); const cur=cardCat[cardId]; const idx=cats.findIndex(c=>c.id===cur); const next=cats[(idx+1)%cats.length]; this.setCardCat(cardId,next.id); };\n  setCardCat=(cardId,catId)=>{ const cardCat={...(this.state.cardCat||this.initCardCat())}; cardCat[cardId]=catId; this.save('card_cat',cardCat); this.setState({cardCat}); };\n  state_expandCat = null;\n\n  genHist(y, prev){ const a=[prev]; let v=prev; for(let i=0;i<4;i++){ v=v*(1+(Math.random()*0.05-0.025)); a.push(Math.round(v/100)*100); } a.push(y); return a; }\n\n  // ── ประวัติราคาแบบ timestamp: [{t:epochSec, p:yen}] ──\n  normHist(h, fb){\n    if(!Array.isArray(h)||!h.length) return fb?[{t:Math.floor(Date.now()/1000),p:fb}]:[];\n    if(typeof h[0]==='object' && h[0] && ('p' in h[0])){\n      return h.filter(x=>x&&typeof x.p==='number'&&x.p>0).map(x=>({t:Number(x.t)||0,p:x.p}));\n    }\n    // ฟอร์แมตเดิม (list ของ int) → ใส่ timestamp ประมาณ (ห่าง 24 ชม.) ลงท้ายที่ตอนนี้\n    const now=Math.floor(Date.now()/1000), n=h.length;\n    return h.filter(v=>typeof v==='number'&&v>0).map((v,i)=>({t:now-(n-1-i)*86400,p:v}));\n  }\n  // ราคา ณ เวลา target (epochSec): จุดล่าสุดที่ t<=target; ถ้าไม่มี (เก่ากว่าจุดแรก) → ใช้ราคาแรก\n  priceAt(hist, target){\n    if(!hist||!hist.length) return 0;\n    let chosen=null;\n    for(const pt of hist){ if(pt.t<=target) chosen=pt; }\n    return chosen ? chosen.p : hist[0].p;\n  }\n  // % เทียบราคา 72 ชม.ย้อนหลัง\n  pct72(hist, curYen){\n    if(!curYen) return 0;\n    const target=Math.floor(Date.now()/1000)-72*3600;\n    const base=this.priceAt(hist, target) || curYen;\n    return base ? (curYen-base)/base*100 : 0;\n  }\n  // 3 ราคาเยนล่าสุดที่ไม่ซ้ำกัน (เรียงเก่า→ใหม่)\n  distinct3(hist, curYen){\n    const seq=hist.map(x=>x.p);\n    if(curYen && (!seq.length || seq[seq.length-1]!==curYen)) seq.push(curYen);\n    const seen=new Set(), out=[];\n    for(let i=seq.length-1;i>=0 && out.length<3;i--){ if(!seen.has(seq[i])){ seen.add(seq[i]); out.unshift(seq[i]); } }\n    return out;\n  }\n  defaultPrices(){ const o={}; this.CARDS.forEach(c=>{ o[c.id]={ yen:c.yen, prevYen:c.prevYen, dir:c.yen>c.prevYen?'up':c.yen<c.prevYen?'down':'flat', history:this.genHist(c.yen,c.prevYen) }; }); return o; }\n\n  SYNC_KEYS = ['slots','cats','card_cat','rate','alert_on','alert_pct','auto_rate','extra_cards','card_overrides','order','ref_yen','settings_order'];\n  setRefYen=(cardId,val)=>{ const m={...(this.state.refYen||{})}; if(val===''||val===null) delete m[cardId]; else m[cardId]=val; this.save('ref_yen',m); this.setState({refYen:m}); };\n  save(k,v){ try{localStorage.setItem('snkr_'+k,JSON.stringify(v));}catch(e){} if(!this._applyingRemote && this.SYNC_KEYS.includes(k)){ try{localStorage.setItem('snkr_layout_ts',JSON.stringify(Date.now()));}catch(e){} this._autoSync(); } }\n  load(k){ try{const v=localStorage.getItem('snkr_'+k); return v?JSON.parse(v):null;}catch(e){return null;} }\n\n  // ── Sync การจัดเรียง/ตั้งค่า ผ่าน GitHub (layout.json) — กดปุ่ม \"บันทึก\" เพื่อ sync ทุกเครื่อง ──\n  saveLayout = async () => {\n    const token=(this.state.ghToken||'').trim();\n    if(!token){ this.setState({layoutMsg:'❌ ใส่ GitHub Token ก่อน (⚙ ตั้งค่า)'}); this._clearMsg(); return; }\n    this.setState({layoutMsg:'⏳ กำลังบันทึก...'});\n    const ok = await this.pushLayout();\n    this.setState({layoutMsg: ok ? '✓ บันทึกแล้ว — เปิดเครื่องไหนก็เหมือนกัน' : '❌ บันทึกไม่สำเร็จ — ตรวจ Token/เน็ต'});\n    this._clearMsg();\n  };\n  _sord(k){ const o=this.state.settingsOrder||['alert','display','drag','edit','refprice']; const i=o.indexOf(k); return i<0?99:i; }\n  _moveSetting(k,dir){ const def=['alert','display','drag','edit','refprice']; let o=(this.state.settingsOrder||def).filter(x=>def.includes(x)); for(const d of def){ if(!o.includes(d)) o.push(d); } const i=o.indexOf(k); const j=i+dir; if(i<0||j<0||j>=o.length) return; const t=o[i]; o[i]=o[j]; o[j]=t; this.save('settings_order',o); this.setState({settingsOrder:o}); }\n  _clearMsg(){ clearTimeout(this._lmT); this._lmT=setTimeout(()=>this.setState({layoutMsg:''}),4500); } _autoSync(){ if(this._applyingRemote) return; const tok=(this.state.ghToken||'').trim(); if(!tok){ this.setState({layoutMsg:'💾 แก้แล้ว — ใส่ GitHub Token (⚙ ตั้งค่า) เพื่อ sync ทุกเครื่อง'}); this._clearMsg(); return; } clearTimeout(this._syncT); this._syncT=setTimeout(async()=>{ this.setState({layoutMsg:'⏳ กำลังบันทึกอัตโนมัติ...'}); const ok=await this.pushLayout(); this.setState({layoutMsg: ok?'✓ บันทึกอัตโนมัติแล้ว — ทุกเครื่องเห็นเหมือนกัน':'❌ บันทึกไม่สำเร็จ — ตรวจ Token/เน็ต'}); this._clearMsg(); }, 1500); }\n  async pushLayout(){\n    const repo=(this.props.githubRepo||'p2pcenter/test-system').trim();\n    const branch=this.props.githubBranch||'master';\n    const token=(this.state.ghToken||'').trim();\n    if(!token||!repo) return false;\n    const layout={ updatedAt: this.load('layout_ts')||Date.now() };\n    this.SYNC_KEYS.forEach(k=>{ const v=this.load(k); if(v!==null) layout[k]=v; });\n    try{\n      let sha;\n      const gr=await fetch(`https://api.github.com/repos/${repo}/contents/layout.json?ref=${branch}`,{headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github.v3+json'}});\n      if(gr.ok){ const gd=await gr.json(); sha=gd.sha; }\n      const res=await fetch(`https://api.github.com/repos/${repo}/contents/layout.json`,{method:'PUT',headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:'update layout', content:btoa(unescape(encodeURIComponent(JSON.stringify(layout,null,2)))), sha, branch})});\n      console.log('[layout] push status', res.status);\n      return res.ok;\n    }catch(e){ console.warn('[layout push]',e.message); return false; }\n  }\n  async fetchLayout(){\n    const repo=(this.props.githubRepo||'p2pcenter/test-system').trim();\n    if(!repo) return;\n    const branch=this.props.githubBranch||'master';\n    try{\n      // ใช้ GitHub API (สดทันที ไม่ติด CDN cache ~5 นาทีแบบ raw.githubusercontent)\n      let L=null;\n      const token=(this.state.ghToken||'').trim();\n      const headers={Accept:'application/vnd.github.v3.raw'};\n      if(token) headers.Authorization=`Bearer ${token}`;\n      const ar=await fetch(`https://api.github.com/repos/${repo}/contents/layout.json?ref=${branch}&t=${Date.now()}`,{cache:'no-store',headers});\n      if(ar.ok){ L=await ar.json(); }\n      else {\n        // fallback → raw (เผื่อ rate-limit API)\n        const r=await fetch(`https://raw.githubusercontent.com/${repo}/${branch}/layout.json?t=${Date.now()}`,{cache:'no-store'});\n        if(!r.ok) return;\n        L=await r.json();\n      }\n      if(!L) return;\n      // ถ้าการจัดเรียงในเครื่องใหม่กว่า remote (เพิ่งเซฟ + CDN ยัง cache เก่า) → คงของในเครื่องไว้\n      const localTs = this.load('layout_ts')||0;\n      if((L.updatedAt||0) <= localTs) return;\n      this._applyingRemote=true;\n      const apply={};\n      const map={slots:'slots', cats:'cats', card_cat:'cardCat', rate:'rate', alert_on:'alertOn', alert_pct:'alertPct', auto_rate:'autoRate', extra_cards:'extraCards', card_overrides:'cardOverrides', order:'order', ref_yen:'refYen', settings_order:'settingsOrder'};\n      Object.keys(map).forEach(k=>{\n        if(L[k]===undefined) return;\n        this.save(k,L[k]); apply[map[k]]=L[k];\n      });\n      this._applyingRemote=false;\n      try{localStorage.setItem('snkr_layout_ts',JSON.stringify(L.updatedAt||Date.now()));}catch(e){}\n      if(Object.keys(apply).length) this.setState(apply);\n    }catch(e){ console.warn('[layout fetch]',e.message); this._applyingRemote=false; }\n  }\n\n  componentDidMount(){\n    const ghToken  = localStorage.getItem('snkr_gh_token')||'';\n    const slots      = this.load('slots');\n    const order    = this.load('order');\n    const rate     = this.load('rate');\n    const extraCards   = this.load('extra_cards');\n    const cardOverrides= this.load('card_overrides');\n
