name: Scrape Card Prices

# ══════════════════════════════════════════════
# ทริกเกอร์: ทุก 1 ชั่วโมง + กดรันมือได้
# ══════════════════════════════════════════════
on:
  schedule:
    - cron: "*/30 * * * *"   # สำรอง: GitHub schedule ไม่การันตีเวลา (มักได้จริงแค่ ~4 ครั้ง/วัน)
                             # ตัวยิงจริงที่ตรงเวลาคือ external cron → workflow_dispatch (ดู README/หมายเหตุ)
  workflow_dispatch:          # กดรันเองได้ใน Actions tab + ให้ external cron (cron-job.org) เรียกผ่าน API
    inputs:
      mode:
        description: "โหมดการดึง"
        type: choice
        default: "all"
        options:
          - all          # ปกติ: หมุนชุดตาม offset
          - fix          # 🔧 ซ่อม: ใหม่ + ไม่มีรูป + ดึงไม่ได้ (รวม 3 กลุ่ม)
          - new          # เฉพาะการ์ดที่พึ่งเพิ่มใหม่ (ยังไม่เคยดึง)
          - no_image     # เฉพาะการ์ดที่ไม่มีรูป
          - failed       # เฉพาะการ์ดที่ดึงข้อมูลไม่ได้

# กันรอบซ้อนกัน: ถ้ารอบก่อนยังไม่จบ รอบใหม่จะเข้าคิว (ไม่ยิง snkrdunk ซ้อน / commit ไม่ชนกัน)
concurrency:
  group: scrape-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # เพดานความปลอดภัยของทั้ง job

    steps:
      # 1. ดึงโค้ดจาก repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. ติดตั้ง Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. ติดตั้ง Python dependencies
      - name: Install Python deps
        run: pip install playwright

      # 3b. Cache Chromium browser (แค่เร่งความเร็วดาวน์โหลด — ไม่ใช่ตัวตัดสินว่าจะติดตั้งไหม)
      #     key ผูกกับ requirements.txt: พอเปลี่ยนเวอร์ชัน playwright → cache รีเฟรชเอง
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      # 3c. ติดตั้ง Chromium + OS deps "เสมอ" (สำคัญ!)
      #     - ถ้า cache ตรงเวอร์ชัน = playwright เห็นว่ามีแล้ว ข้ามดาวน์โหลด (เร็ว)
      #     - ถ้าเวอร์ชัน playwright เปลี่ยน = ดาวน์โหลด browser ใหม่ให้ตรง
      #     กันบั๊กเดิม: เคย skip ตอน cache hit แล้ว browser ไม่ตรงเวอร์ชัน → launch ไม่ได้ → scraper พังเงียบ
      - name: Install Chromium (browser + deps)
        run: playwright install chromium --with-deps

      # 4. รัน scraper
      - name: Run scraper
        timeout-minutes: 22    # หยุด step นี้ที่ 22 นาที (scraper หยุดเองที่ 19 นาทีอยู่แล้ว)
        run: python scraper_cloud.py
        env:
          DATA_FOLDER: "."          # บันทึก JSON ในโฟลเดอร์ root ของ repo
          BATCH_SIZE: "0"           # 0 = ทำครบทุกใบในรอบเดียว (112 ใบ) — ยิงทุก 30 นาที ⇒ ทุกใบสดใหม่ทุก ~30 นาที
          MAX_WORKERS: "3"          # 3 browser parallel — 112 ใบ ~11-13 นาที (ต่ำกว่า deadline 19 นาที)
          # โหมดจากปุ่ม Run workflow (all/fix/new/no_image/failed); รันตามเวลาปกติ = all
          SCRAPE_MODE: ${{ github.event.inputs.mode || 'all' }}
          DEADLINE_SECONDS: "1140"  # safety net: หยุดรับการ์ดใหม่ที่ 19 นาที กันชน timeout

      # 5. Commit & Push JSON ที่เปลี่ยนแปลง (pull ก่อน push เสมอ กัน conflict)
      #    if: always() → commit ข้อมูลที่ดึงได้เสมอ แม้ scraper จะ timeout/error
      - name: Commit updated data
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_*.json scraper_state.json
          git diff --staged --quiet && echo "ไม่มีอะไรเปลี่ยน" && exit 0
          git commit -m "chore: update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          # ดึงงานล่าสุดก่อน push — ใช้ของ remote สำหรับ cards.json, ของเราสำหรับ data
          for i in 1 2 3; do
            git pull origin master --no-rebase -X ours --no-edit && git push && exit 0
            echo "push ชนกัน ลองใหม่ ($i/3)..."
            sleep 5
          done
          echo "::error::push ไม่สำเร็จหลังลอง 3 รอบ" && exit 1
